<!DOCTYPE html>
<html dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>وسام مارت — الموصلين</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0f172a;color:#fff;min-height:100vh;overflow-x:hidden}
:root{--primary:#3b82f6;--primary-light:#60a5fa;--bg:#0f172a;--card:#1e293b;--muted:#94a3b8;--border:#334155;--success:#22c55e;--danger:#ef4444}
input,select,textarea{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:#fff;font-size:14px}
input:focus{outline:2px solid var(--primary);border-color:transparent}
button{cursor:pointer;font-weight:bold;border:none;border-radius:8px;padding:10px 20px;font-size:14px;transition:.2s}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;width:100%}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-danger{background:var(--danger);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.screen{display:none;padding:20px;max-width:500px;margin:auto}
.screen.active{display:flex;flex-direction:column;min-height:100vh}
#loginScreen{justify-content:center;align-items:center;gap:20px;text-align:center}
.logo{font-size:2.5rem;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--primary-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.card{background:var(--card);border-radius:16px;padding:24px;width:100%;max-width:400px}
.card h2{font-size:18px;margin-bottom:16px;text-align:center}
.form-group{margin-bottom:12px}
.form-group label{display:block;color:var(--muted);font-size:12px;margin-bottom:4px}
.err{color:var(--danger);font-size:13px;display:none;margin-top:8px;text-align:center}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stat-card{background:var(--bg);border-radius:12px;padding:12px;text-align:center}
.stat-card .num{font-size:24px;font-weight:bold;color:var(--primary)}
.stat-card .lbl{font-size:11px;color:var(--muted);margin-top:4px}
.order-card{background:var(--card);border-radius:12px;padding:16px;margin-bottom:12px}
.order-card .header{display:flex;justify-content:space-between;margin-bottom:8px}
.order-card .name{font-weight:bold}
.order-card .status{font-size:12px;padding:2px 8px;border-radius:20px}
.status-pending{background:#f59e0b33;color:#f59e0b}
.status-accepted{background:#22c55e33;color:#22c55e}
.status-delivered{background:#3b82f633;color:#3b82f6}
.status-cancelled{background:#ef444433;color:#ef4444}
.msg-bubble{background:var(--bg);border-radius:12px;padding:10px;margin:6px 0;max-width:85%}
.msg-driver{margin-left:auto;background:var(--primary);color:#fff}
.msg-customer{margin-right:auto;background:var(--card)}
.msg-time{font-size:10px;color:var(--muted);margin-top:4px}
.hidden{display:none!important}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 0;margin-bottom:12px}
.top-bar h1{font-size:20px}
.top-bar .info{font-size:12px;color:var(--muted)}
</style>
</head><body>

<div class="screen active" id="loginScreen">
  <div class="logo">وسام مارت</div>
  <p style="color:var(--muted);margin-bottom:16px;font-size:14px">بوابة الموصلين</p>
  <div class="card">
    <h2>تسجيل الدخول</h2>
    <div class="form-group"><label>اسم المستخدم</label><input id="uInput" placeholder="أدخل اسم المستخدم" autocomplete="off"></div>
    <div class="form-group"><label>كلمة المرور</label><input id="pInput" type="password" placeholder="أدخل كلمة المرور"></div>
    <div class="err" id="errMsg"></div>
    <button class="btn-primary" id="loginBtn" onclick="doLogin()" style="margin-top:12px"><span id="loginBtnText">دخول ⚡</span></button>
  </div>
</div>

<div class="screen" id="dashboard">
  <div class="top-bar">
    <div><h1>🚚 الطلبات</h1></div>
    <div class="info" id="driverInfo"></div>
  </div>
  <button class="btn-outline" onclick="fetchOrders()" style="width:auto;margin-bottom:12px">🔄 تحديث</button>
  <div id="ordersList"><p style="color:var(--muted);text-align:center">اسحب لتحديث الطلبات</p></div>
</div>

<script>
// ==================== REST API Helper ====================
const PID = 'wessam2', KEY = atob('QUl6YVN5QkdNLU9SdlRWNGp1eFBmaUE4TWI3VmIyNV8wRVFjaEVZ');
const BASE = `https://firestore.googleapis.com/v1/projects/${PID}/databases/(default)/documents`;

async function apiGet(path) {
  let url = `${BASE}/${path}?key=${KEY}`;
  const r = await fetch(url);
  if (r.status === 429) throw new Error('الحد مسموح تجاوز، حاول بعد دقيقة');
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return d;
}

async function apiAdd(collection, data) {
  const r = await fetch(`${BASE}/${collection}?key=${KEY}`,{
    method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields:toFields(data)})
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return d;
}

async function apiUpdate(collection, docId, data) {
  const r = await fetch(`${BASE}/${collection}/${docId}?key=${KEY}`,{
    method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields:toFields(data)})
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return d;
}

function toFields(obj){
  const f={};
  for(const[k,v]of Object.entries(obj||{})){
    if(v===null||v===undefined)f[k]={nullValue:null};
    else if(typeof v==='string')f[k]={stringValue:v};
    else if(typeof v==='boolean')f[k]={booleanValue:v};
    else if(typeof v==='number')f[k]=Number.isInteger(v)?{integerValue:String(v)}:{doubleValue:v};
    else if(typeof v==='object'&&v.constructor===Date)f[k]={timestampValue:v.toISOString()};
    else if(Array.isArray(v))f[k]={arrayValue:{values:v.map(x=>({stringValue:String(x)}))}};
    else f[k]={stringValue:String(v)};
  }
  return f;
}

function fromFields(fields){
  if(!fields)return{};
  const o={};
  for(const[k,v]of Object.entries(fields)){
    if(v.stringValue!==undefined)o[k]=v.stringValue;
    else if(v.booleanValue!==undefined)o[k]=v.booleanValue;
    else if(v.integerValue!==undefined)o[k]=Number(v.integerValue);
    else if(v.doubleValue!==undefined)o[k]=v.doubleValue;
    else if(v.timestampValue)o[k]=v.timestampValue;
    else if(v.arrayValue)o[k]=v.arrayValue.values?v.arrayValue.values.map(x=>x.stringValue):[];
    else if(v.nullValue!==null&&v.nullValue!==undefined)o[k]=null;
    else if(v.mapValue)o[k]=v.mapValue.fields;
    else o[k]=null;
  }
  return o;
}

function docsFromResponse(r){return (r.documents||[]).map(d=>({id:d.name.split('/').pop(),...fromFields(d.fields)}))}

// ==================== Auth ====================
let currentDriver=null,currentDriverId=null;

async function _hashPass(p){
  const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

function cacheKey(){return'_delBoys_'}

async function _fetchDeliveryBoys(){
  // 1. localStorage
  try{
    const r=localStorage.getItem(cacheKey());
    if(r){const p=JSON.parse(r);if(p.docs&&p.docs.length)return p.docs;}
  }catch(e){}
  // 2. REST API
  const r=await apiGet('deliveryBoys');
  const docs=docsFromResponse(r);
  try{localStorage.setItem(cacheKey(),JSON.stringify({ts:Date.now(),docs}))}catch(e){}
  return docs;
}

async function doLogin(){
  const u=document.getElementById('uInput').value.trim();
  const p=document.getElementById('pInput').value.trim();
  const btn=document.getElementById('loginBtn');
  const err=document.getElementById('errMsg');
  err.style.display='none';
  if(!u||!p){err.textContent='أدخل اسم المستخدم وكلمة المرور';err.style.display='block';return}
  btn.disabled=true;document.getElementById('loginBtnText').innerHTML='<span class="spinner"></span>';
  try{
    const boys=await _fetchDeliveryBoys();
    const match=boys.filter(d=>d.username===u||d.username.toLowerCase()===u.toLowerCase());
    if(!match.length){err.textContent='اسم المستخدم غير موجود';err.style.display='block';btn.disabled=false;document.getElementById('loginBtnText').textContent='دخول ⚡';return}
    const md=match[0],sp=md.password||'';
    let ok=sp===p||sp===p.trim();
    if(sp.length===64){
      const hp=await _hashPass(p),hpl=await _hashPass(p.toLowerCase());
      ok=hp===sp||hpl===sp;
    }
    if(!ok){err.textContent='كلمة المرور غير صحيحة';err.style.display='block';btn.disabled=false;document.getElementById('loginBtnText').textContent='دخول ⚡';return}
    currentDriverId=md.id;currentDriver=md;
    document.getElementById('loginScreen').classList.remove('active');
    document.getElementById('dashboard').classList.add('active');
    document.getElementById('driverInfo').textContent=md.fullName+' | '+md.phone;
    fetchOrders();
  }catch(e){
    err.textContent=e.message||'خطأ في الاتصال';
    err.style.display='block';btn.disabled=false;
    document.getElementById('loginBtnText').textContent='دخول ⚡';
  }
}

// ==================== Orders ====================
async function fetchOrders(){
  const el=document.getElementById('ordersList');
  el.innerHTML='<p style="text-align:center;color:var(--muted)"><span class="spinner"></span> جاري التحميل...</p>';
  try{
    const r=await apiGet('orders');
    let orders=docsFromResponse(r);
    orders.sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
    // filter: deliveryBoyId matches currentDriverId OR driver is null/available
    const myOrders=orders.filter(o=>{
      if(o.deliveryBoyId===currentDriverId)return true;
      if(!o.deliveryBoyId||o.deliveryBoyId===''||o.status==='pending'||o.status==='preparing')return true;
      return false;
    });
    if(!myOrders.length){el.innerHTML='<p style="color:var(--muted);text-align:center">لا توجد طلبات متاحة</p>';return}
    el.innerHTML=myOrders.map(o=>{
      const st=o.status||'pending';
      const stLabels={pending:'قيد الانتظار',accepted:'قيد التوصيل',delivered:'تم التوصيل',cancelled:'ملغي'};
      return `<div class="order-card">
        <div class="header"><span class="name">${o.customerName||'عميل'}</span><span class="status status-${st}">${stLabels[st]||st}</span></div>
        <p style="font-size:13px;color:var(--muted);margin-bottom:4px">${o.address||'بدون عنوان'}</p>
        <p style="font-size:13px;color:var(--muted);margin-bottom:8px">المجموع: ${o.total||'?'} ريال</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap">${actionBtns(o)}</div>
      </div>`;
    }).join('');
  }catch(e){el.innerHTML=`<p style="color:var(--danger);text-align:center">${e.message}</p>`}
}

function actionBtns(o){
  const id=o.id;
  if(o.deliveryBoyId===currentDriverId&&o.status==='accepted')return `<button class="btn-primary" onclick="updateOrder('${id}','delivered')" style="flex:1">✅ تم التوصيل</button>
    <button class="btn-danger" onclick="updateOrder('${id}','cancelled')" style="flex:1">❌ إلغاء</button>`;
  if((!o.deliveryBoyId||o.deliveryBoyId==='')&&(o.status==='pending'||o.status==='preparing'||!o.status))return `<button class="btn-primary" onclick="updateOrder('${id}','accepted')" style="flex:1">🚚 أقبل التوصيل</button>`;
  if(o.deliveryBoyId===currentDriverId&&o.status==='delivered')return `<span style="color:var(--success);font-size:13px">✅ تم التوصيل</span>`;
  if(o.deliveryBoyId===currentDriverId&&o.status==='cancelled')return `<span style="color:var(--danger);font-size:13px">❌ ملغي</span>`;
  return `<span style="color:var(--muted);font-size:12px">موصل آخر: ${o.deliveryBoyId}</span>`;
}

async function updateOrder(id,status){
  try{
    const data={status};
    if(status==='accepted')data.deliveryBoyId=currentDriverId;
    await apiUpdate('orders',id,data);
    fetchOrders();
  }catch(e){alert('خطأ: '+e.message)}
}
</script>
</body></html>
